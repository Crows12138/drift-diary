databases:
  - name: drift-diary-db
    plan: free
    databaseName: drift_diary

services:
  - type: web
    name: drift-diary-api
    plan: free
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drift-diary-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: WX_APP_ID
        sync: false
      - key: WX_APP_SECRET
        sync: false
